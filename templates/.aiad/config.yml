# AIAD SDD Mode — Configuration locale
#
# Ce fichier configure le comportement local de SDD Mode (hooks, seuils, etc.).
# Il est versionné — chaque membre de l'équipe partage la même configuration.
#
# Documentation : https://aiad.ovh

hooks:
  # Hook pre-commit : vérifie le Drift Lock (code modifié sans SPEC mise à jour).
  #   block : refuse le commit en cas de drift potentiel (défaut, recommandé)
  #   warn  : affiche un avertissement, n'empêche pas le commit
  #   off   : désactive complètement le hook
  pre_commit: block

# Canary suite (§3.10) — snapshot modèle figé.
# Sert de point de référence stable pour comparer toujours « à modèle constant »
# et distinguer une régression réelle d'un bruit de serving (±8-14 %).
# Enregistré tel quel dans chaque rapport .aiad/metrics/canary/<date>.json.
canary:
  model: claude-opus-4-8
  effort: max
  claude_code_version: v2.1.168
  tolerance_pct: 14
