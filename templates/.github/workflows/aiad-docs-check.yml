name: aiad-docs-check

# Bloque toute PR qui modifie une source de vérité (bin, sous-commandes
# slash, skills, gouvernance) sans régénérer DOCUMENTATION.md. Garantit que
# la doc utilisateur reste **toujours à jour à 100 %** sans intervention
# manuelle — critère leadership EU/FR.

on:
  pull_request:
    paths:
      - 'bin/**'
      - 'lib/**'
      - 'templates/.claude/**'
      - 'templates/.aiad/gouvernance/**'
      - 'DOCUMENTATION.md'
  push:
    branches: [main]

jobs:
  check:
    name: parité doc / sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Vérifie la parité doc ↔ sources
        run: npx aiad-sdd docs --check
