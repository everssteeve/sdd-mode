<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 830" width="1200" height="830" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-labelledby="bp-title bp-desc">
      <title id="bp-title">Big Picture du cycle SDD Mode</title>
      <desc id="bp-desc">Schéma interactif : une bande de gouvernance Tier 1 avec droit de veto surplombe le cycle SDD en sept étapes (Intent Statement, Research, SPEC, Execution Gate, Exécution agent, Validation, Drift Lock), suivi du déploiement et de la consolidation qui rebouclent sur l'intention. En dessous : la hiérarchie des artefacts, les cinq responsabilités et les bandes rituels, métriques et traçabilité. Une alternative texte complète figure sous le schéma.</desc>
      <rect x="-20" y="-20" width="1240" height="870" fill="#ffffff"/>

      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#46546a"/>
        </marker>
        <marker id="arrow-gold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#e8a020"/>
        </marker>
      </defs>

      <!-- ============ BANDE GOUVERNANCE TIER 1 ============ -->
      <rect x="20" y="16" width="1160" height="104" rx="10" fill="#fcebe8" stroke="#eebbb3"/>
      <text x="40" y="44" font-size="17" font-weight="700" fill="#7c2d22">GOUVERNANCE TIER 1 — droit de veto · fail-closed : UNKNOWN = VETO</text>
      <g class="bp-node"><title>AIAD-AI-ACT — EU AI Act</title>
        <rect x="40" y="58" width="266" height="46" rx="8" fill="#8a2418"/>
        <text x="173" y="79" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">AIAD-AI-ACT</text>
        <text x="173" y="96" text-anchor="middle" font-size="11" fill="#f6cfc8">Règlement (UE) 2024/1689</text>
      </g>
      <g class="bp-node"><title>AIAD-RGPD — Privacy by Design</title>
        <rect x="326" y="58" width="266" height="46" rx="8" fill="#8a2418"/>
        <text x="459" y="79" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">AIAD-RGPD</text>
        <text x="459" y="96" text-anchor="middle" font-size="11" fill="#f6cfc8">RGPD (UE) 2016/679</text>
      </g>
      <g class="bp-node"><title>AIAD-RGAA — Accessibilité</title>
        <rect x="612" y="58" width="266" height="46" rx="8" fill="#8a2418"/>
        <text x="745" y="79" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">AIAD-RGAA</text>
        <text x="745" y="96" text-anchor="middle" font-size="11" fill="#f6cfc8">RGAA 4.1 / WCAG 2.1</text>
      </g>
      <g class="bp-node"><title>AIAD-RGESN — Écoconception</title>
        <rect x="898" y="58" width="262" height="46" rx="8" fill="#8a2418"/>
        <text x="1029" y="79" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">AIAD-RGESN</text>
        <text x="1029" y="96" text-anchor="middle" font-size="11" fill="#f6cfc8">Écoconception RGESN v2</text>
      </g>

      <!-- veto arrows down -->
      <line x1="600" y1="120" x2="600" y2="150" stroke="#8a2418" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrow)"/>

      <!-- ============ CYCLE — RANGÉE 1 ============ -->
      <text x="40" y="172" font-size="17" font-weight="700" fill="#0a1f3d">LE CYCLE SDD — aucune étape sautée</text>

      <g class="bp-node"><title>1. Intent Statement — capturer le POURQUOI humain</title>
        <rect x="40" y="190" width="190" height="84" rx="10" fill="#173a6b"/>
        <text x="135" y="216" text-anchor="middle" font-size="12" font-weight="700" fill="#e8a020">ÉTAPE 1</text>
        <text x="135" y="238" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">Intent Statement</text>
        <text x="135" y="260" text-anchor="middle" font-size="12" fill="#b9c8e0">/sdd intent</text>
      </g>
      <line x1="230" y1="232" x2="268" y2="232" stroke="#46546a" stroke-width="2.5" marker-end="url(#arrow)"/>

      <g class="bp-node"><title>2. Research — viabilité de l'intention, verdict GO / NO-GO</title>
        <rect x="272" y="190" width="190" height="84" rx="10" fill="#173a6b"/>
        <text x="367" y="216" text-anchor="middle" font-size="12" font-weight="700" fill="#e8a020">ÉTAPE 2</text>
        <text x="367" y="238" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">Research</text>
        <text x="367" y="260" text-anchor="middle" font-size="12" fill="#b9c8e0">/sdd research · GO/NO-GO</text>
      </g>
      <line x1="462" y1="232" x2="500" y2="232" stroke="#46546a" stroke-width="2.5" marker-end="url(#arrow)"/>

      <g class="bp-node"><title>3. SPEC — spécification vivante, prose ou EARS</title>
        <rect x="504" y="190" width="190" height="84" rx="10" fill="#173a6b"/>
        <text x="599" y="216" text-anchor="middle" font-size="12" font-weight="700" fill="#e8a020">ÉTAPE 3</text>
        <text x="599" y="238" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">SPEC</text>
        <text x="599" y="260" text-anchor="middle" font-size="12" fill="#b9c8e0">/sdd spec · /sdd split</text>
      </g>
      <line x1="694" y1="232" x2="732" y2="232" stroke="#46546a" stroke-width="2.5" marker-end="url(#arrow)"/>

      <g class="bp-node"><title>4. Execution Gate — SQS ≥ 4/5 requis pour ouvrir la gate</title>
        <path class="shape" d="M831,186 L934,232 L831,278 L728,232 Z" fill="#c5860f"/>
        <text x="831" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="#0a1f3d">ÉTAPE 4 · GATE</text>
        <text x="831" y="240" text-anchor="middle" font-size="15" font-weight="800" fill="#0a1f3d">SQS ≥ 4/5 ?</text>
        <text x="831" y="258" text-anchor="middle" font-size="11" fill="#3d2a05">/sdd gate</text>
      </g>
      <line x1="934" y1="232" x2="972" y2="232" stroke="#46546a" stroke-width="2.5" marker-end="url(#arrow)"/>
      <!-- gate fermée : retour spec -->
      <path d="M831,278 L831,300 L599,300 L599,278" fill="none" stroke="#c0392b" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
      <text x="715" y="294" text-anchor="middle" font-size="11" fill="#c0392b">&lt; 4/5 : retour en révision</text>

      <g class="bp-node"><title>5. Exécution agent — contexte optimisé, plan avant code</title>
        <rect x="976" y="190" width="184" height="84" rx="10" fill="#173a6b"/>
        <text x="1068" y="216" text-anchor="middle" font-size="12" font-weight="700" fill="#e8a020">ÉTAPE 5</text>
        <text x="1068" y="238" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">Exécution agent</text>
        <text x="1068" y="260" text-anchor="middle" font-size="12" fill="#b9c8e0">/sdd exec · /sdd resume</text>
      </g>

      <!-- descente vers rangée 2 -->
      <path d="M1068,274 L1068,330" fill="none" stroke="#46546a" stroke-width="2.5" marker-end="url(#arrow)"/>

      <!-- ============ CYCLE — RANGÉE 2 (droite → gauche) ============ -->
      <g class="bp-node"><title>6. Validation — technique, fonctionnelle, gouvernance</title>
        <rect x="976" y="334" width="184" height="84" rx="10" fill="#173a6b"/>
        <text x="1068" y="360" text-anchor="middle" font-size="12" font-weight="700" fill="#e8a020">ÉTAPE 6</text>
        <text x="1068" y="382" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">Validation</text>
        <text x="1068" y="404" text-anchor="middle" font-size="12" fill="#b9c8e0">/sdd validate · veto Tier 1</text>
      </g>
      <line x1="976" y1="376" x2="938" y2="376" stroke="#46546a" stroke-width="2.5" marker-end="url(#arrow)"/>

      <g class="bp-node"><title>7. Drift Lock — code et SPEC dans la même PR</title>
        <rect x="744" y="334" width="190" height="84" rx="10" fill="#0e8a7d"/>
        <text x="839" y="360" text-anchor="middle" font-size="12" font-weight="700" fill="#fbeecd">ÉTAPE 7</text>
        <text x="839" y="382" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">Drift Lock</text>
        <text x="839" y="404" text-anchor="middle" font-size="12" fill="#cdebe7">/sdd drift-check · /sdd trace</text>
      </g>
      <line x1="744" y1="376" x2="706" y2="376" stroke="#46546a" stroke-width="2.5" marker-end="url(#arrow)"/>

      <g class="bp-node"><title>8. Déploiement — staging puis production, monitoring</title>
        <rect x="512" y="334" width="190" height="84" rx="10" fill="#1e4a87"/>
        <text x="607" y="360" text-anchor="middle" font-size="12" font-weight="700" fill="#e8a020">ÉTAPE 8</text>
        <text x="607" y="382" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">Déploiement</text>
        <text x="607" y="404" text-anchor="middle" font-size="12" fill="#b9c8e0">staging → prod · rollback</text>
      </g>
      <line x1="512" y1="376" x2="474" y2="376" stroke="#46546a" stroke-width="2.5" marker-end="url(#arrow)"/>

      <g class="bp-node"><title>9. Consolidation — rétro, Atelier d'Intention, statut</title>
        <rect x="280" y="334" width="190" height="84" rx="10" fill="#1e4a87"/>
        <text x="375" y="360" text-anchor="middle" font-size="12" font-weight="700" fill="#e8a020">ÉTAPE 9</text>
        <text x="375" y="382" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">Consolidation</text>
        <text x="375" y="404" text-anchor="middle" font-size="12" fill="#b9c8e0">/aiad retro · /aiad intention</text>
      </g>

      <!-- boucle retour vers Intent -->
      <path d="M280,376 L135,376 L135,278" fill="none" stroke="#e8a020" stroke-width="3" marker-end="url(#arrow-gold)"/>
      <text x="142" y="340" font-size="12" font-weight="600" fill="#c5860f">nouvelle itération</text>

      <!-- JNSP chip -->
      <g class="bp-node"><title>JNSP — politique d'incertitude : dire « je ne sais pas » plutôt qu'inventer</title>
        <rect x="40" y="430" width="430" height="40" rx="20" fill="#fdf3e0" stroke="#ecc97f"/>
        <text x="255" y="455" text-anchor="middle" font-size="14" font-weight="700" fill="#6b4d09">JNSP — l'incertitude est un signal valide, pas un échec</text>
      </g>
      <g class="bp-node"><title>Traçabilité machine-vérifiable : @intent, @spec, @verified-by, @governance</title>
        <rect x="490" y="430" width="430" height="40" rx="20" fill="#e3edfb" stroke="#b3cdf3"/>
        <text x="705" y="455" text-anchor="middle" font-size="14" font-weight="700" fill="#173a6b">Traçabilité @intent · @spec · @verified-by · @governance</text>
      </g>
      <g class="bp-node"><title>Context Engineering Budget — 60-70 % de la fenêtre maximum</title>
        <rect x="940" y="430" width="220" height="40" rx="20" fill="#e3edfb" stroke="#b3cdf3"/>
        <text x="1050" y="455" text-anchor="middle" font-size="14" font-weight="700" fill="#173a6b">Context Budget 60-70 %</text>
      </g>

      <!-- ============ ARTEFACTS ============ -->
      <text x="40" y="516" font-size="17" font-weight="700" fill="#0a1f3d">LES ARTEFACTS — hiérarchie documentaire</text>
      <g class="bp-node"><title>PRD — vision produit, injecté en cadrage uniquement</title>
        <rect x="40" y="530" width="212" height="56" rx="8" fill="#0e8a7d"/>
        <text x="146" y="554" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">PRD</text>
        <text x="146" y="572" text-anchor="middle" font-size="11" fill="#cdebe7">cadrage uniquement</text>
      </g>
      <g class="bp-node"><title>ARCHITECTURE — standards techniques, condensé permanent</title>
        <rect x="268" y="530" width="212" height="56" rx="8" fill="#0e8a7d"/>
        <text x="374" y="554" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">ARCHITECTURE</text>
        <text x="374" y="572" text-anchor="middle" font-size="11" fill="#cdebe7">condensé permanent</text>
      </g>
      <g class="bp-node"><title>AGENT-GUIDE — contexte permanent, Lessons Learned, Human Learnings</title>
        <rect x="496" y="530" width="212" height="56" rx="8" fill="#0e8a7d"/>
        <text x="602" y="554" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">AGENT-GUIDE</text>
        <text x="602" y="572" text-anchor="middle" font-size="11" fill="#cdebe7">contexte permanent</text>
      </g>
      <g class="bp-node"><title>Intents — le POURQUOI archivé dans .aiad/intents/</title>
        <rect x="724" y="530" width="212" height="56" rx="8" fill="#0e8a7d"/>
        <text x="830" y="554" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Intents</text>
        <text x="830" y="572" text-anchor="middle" font-size="11" fill="#cdebe7">.aiad/intents/</text>
      </g>
      <g class="bp-node"><title>SPECs — le COMMENT, une seule active par session</title>
        <rect x="952" y="530" width="208" height="56" rx="8" fill="#0e8a7d"/>
        <text x="1056" y="554" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">SPECs</text>
        <text x="1056" y="572" text-anchor="middle" font-size="11" fill="#cdebe7">une seule par tâche</text>
      </g>

      <!-- ============ RESPONSABILITÉS ============ -->
      <text x="40" y="632" font-size="17" font-weight="700" fill="#0a1f3d">LES CINQ RESPONSABILITÉS</text>
      <g class="bp-node"><title>Product Manager — responsable de la valeur</title>
        <rect x="40" y="646" width="212" height="56" rx="8" fill="#2d6cdf"/>
        <text x="146" y="670" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Product Manager</text>
        <text x="146" y="688" text-anchor="middle" font-size="11" fill="#dce9fb">la valeur</text>
      </g>
      <g class="bp-node"><title>Product Engineer — gardien de l'intention</title>
        <rect x="268" y="646" width="212" height="56" rx="8" fill="#2d6cdf"/>
        <text x="374" y="670" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Product Engineer</text>
        <text x="374" y="688" text-anchor="middle" font-size="11" fill="#dce9fb">gardien de l'intention</text>
      </g>
      <g class="bp-node"><title>Agents Engineer — écosystème IA et Harness Engineering</title>
        <rect x="496" y="646" width="212" height="56" rx="8" fill="#2d6cdf"/>
        <text x="602" y="670" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Agents Engineer</text>
        <text x="602" y="688" text-anchor="middle" font-size="11" fill="#dce9fb">l'écosystème IA</text>
      </g>
      <g class="bp-node"><title>QA Engineer — qualité intégrée dès le départ</title>
        <rect x="724" y="646" width="212" height="56" rx="8" fill="#2d6cdf"/>
        <text x="830" y="670" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">QA Engineer</text>
        <text x="830" y="688" text-anchor="middle" font-size="11" fill="#dce9fb">la qualité</text>
      </g>
      <g class="bp-node"><title>Tech Lead — cohérence technique long terme</title>
        <rect x="952" y="646" width="208" height="56" rx="8" fill="#2d6cdf"/>
        <text x="1056" y="670" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Tech Lead</text>
        <text x="1056" y="688" text-anchor="middle" font-size="11" fill="#dce9fb">la cohérence technique</text>
      </g>

      <!-- ============ BANDE RITUELS / MÉTRIQUES ============ -->
      <g class="bp-node"><title>Rituels et synchronisations — standup, demo, tech review, rétro, Atelier d'Intention</title>
        <rect x="40" y="726" width="430" height="52" rx="8" fill="#10294f"/>
        <text x="255" y="748" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">RITUELS &amp; SYNCHRONISATIONS</text>
        <text x="255" y="766" text-anchor="middle" font-size="11" fill="#b9c8e0">/aiad standup · demo · tech-review · retro · intention</text>
      </g>
      <g class="bp-node"><title>Métriques — SQS, DORA, Flow, dashboards</title>
        <rect x="490" y="726" width="430" height="52" rx="8" fill="#10294f"/>
        <text x="705" y="748" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">MÉTRIQUES</text>
        <text x="705" y="766" text-anchor="middle" font-size="11" fill="#b9c8e0">SQS · DORA · Flow · /aiad dashboard</text>
      </g>
      <g class="bp-node"><title>Human Authorship — la paternité de l'intention ne se délègue pas</title>
        <rect x="940" y="726" width="220" height="52" rx="8" fill="#c5860f"/>
        <text x="1050" y="748" text-anchor="middle" font-size="13" font-weight="800" fill="#0a1f3d">HUMAN AUTHORSHIP</text>
        <text x="1050" y="766" text-anchor="middle" font-size="10.5" fill="#3d2a05">valeur 7 — non négociable</text>
      </g>
      <text x="600" y="812" text-anchor="middle" font-size="12" fill="#46546a">Framework AIAD v1.18 — SDD Mode — aiad.ovh — Open Source</text>
</svg>