      <g class="bp-node"><title>Human Authorship — authorship of intent cannot be delegated</title>
        <rect x="940" y="726" width="220" height="52" rx="8" fill="#c5860f"/>
        <text x="1050" y="748" text-anchor="middle" font-size="13" font-weight="800" fill="#0a1f3d">HUMAN AUTHORSHIP</text>
        <text x="1050" y="766" text-anchor="middle" font-size="10.5" fill="#3d2a05">value 7 — non-negotiable</text>
      </g>
      <text x="600" y="812" text-anchor="middle" font-size="12" fill="#46546a">AIAD Framework v1.18 — SDD Mode — aiad.ovh — Open Source</text>
</svg>