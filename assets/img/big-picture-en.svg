        <text x="146" y="670" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Product Manager</text>
        <text x="146" y="688" text-anchor="middle" font-size="11" fill="#dce9fb">value</text>
      </g>
      <g class="bp-node"><title>Product Engineer — guardian of intent</title>
        <rect x="268" y="646" width="212" height="56" rx="8" fill="#2d6cdf"/>
        <text x="374" y="670" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Product Engineer</text>
        <text x="374" y="688" text-anchor="middle" font-size="11" fill="#dce9fb">guardian of intent</text>
      </g>
      <g class="bp-node"><title>Agents Engineer — AI ecosystem and Harness Engineering</title>
        <rect x="496" y="646" width="212" height="56" rx="8" fill="#2d6cdf"/>
        <text x="602" y="670" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Agents Engineer</text>
        <text x="602" y="688" text-anchor="middle" font-size="11" fill="#dce9fb">the AI ecosystem</text>
      </g>
      <g class="bp-node"><title>QA Engineer — quality built in from the start</title>
        <rect x="724" y="646" width="212" height="56" rx="8" fill="#2d6cdf"/>
        <text x="830" y="670" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">QA Engineer</text>
        <text x="830" y="688" text-anchor="middle" font-size="11" fill="#dce9fb">quality</text>
      </g>
      <g class="bp-node"><title>Tech Lead — long-term technical coherence</title>
        <rect x="952" y="646" width="208" height="56" rx="8" fill="#2d6cdf"/>
        <text x="1056" y="670" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Tech Lead</text>
        <text x="1056" y="688" text-anchor="middle" font-size="11" fill="#dce9fb">technical coherence</text>
      </g>

      <!-- ============ RITUALS / METRICS BAND ============ -->
      <g class="bp-node"><title>Rituals and synchronisations — standup, demo, tech review, retro, Intent Workshop</title>
