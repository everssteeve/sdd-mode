
openapi: "3.1.0"
info:
  title: "AIAD SDD — CLI JSON outputs"
  version: "1.18.0"
  description: "Documentation des sorties `--json` du CLI `aiad-sdd`.\n\nPermet l'intégration par des consommateurs externes (ServiceNow,\ndashboards custom, pipelines analytics).\n\nLes routes sont **fictives** : chaque endpoint modélise la forme\nJSON retournée par `aiad-sdd <command> --json`.\n\nDocumentation : https://aiad.ovh/cli-schema"
  contact:
    name: AIAD
    url: "https://aiad.ovh"
  license:
    name: MIT
paths:
  "/cli/status":
    get:
      summary: "État du projet SDD"
      operationId: cli_status
      tags:
        - cli
      description: "Sortie de la commande `aiad-sdd status --json`.\n\nCette route est **fictive** — utilisée uniquement pour documenter la forme JSON via OpenAPI. La commande s'exécute via le CLI local.\n\nLe payload contient toujours un bloc `_meta` (cf. #258) en tête, permettant au consumer de discriminer la source via `_meta.schema`."
      responses:
        "200":
          description: "État du projet SDD"
          content:
            "application/json":
              schema:
                allOf:
                  -                     type: object
                    required:
                      - "_meta"
                    properties:
                      _meta:
                        "$ref": "#/components/schemas/AiadMeta"
                  -                     type: object
                    required:
                      - initialise
                      - projetDir
                    properties:
                      initialise:
                        type: boolean
                      projetDir:
                        type: string
                      fondamentaux:
                        type: object
                        additionalProperties:
                          type: object
                          properties:
                            present:
                              type: boolean
                            rempli:
                              type: boolean
                      cycle:
                        type: object
                        properties:
                          intents:
                            type: integer
                          specs:
                            type: integer
                      infrastructure:
                        type: object
                        properties:
                          claudeMd:
                            type: boolean
                          commands:
                            type: boolean
                          gouvernanceCount:
                            type: integer
                      maturite:
                        type: object
                        properties:
                          score:
                            type: integer
                          total:
                            type: integer
                          label:
                            type: string
                      santeGlobale:
                        type:
                          - object
                          - "null"
                      publicationContext:
                        "$ref": "#/components/schemas/PublicationContext"
  "/cli/doctor":
    get:
      summary: "Diagnostic complet du projet"
      operationId: cli_doctor
      tags:
        - cli
      description: "Sortie de la commande `aiad-sdd doctor --json`.\n\nCette route est **fictive** — utilisée uniquement pour documenter la forme JSON via OpenAPI. La commande s'exécute via le CLI local.\n\nLe payload contient toujours un bloc `_meta` (cf. #258) en tête, permettant au consumer de discriminer la source via `_meta.schema`."
      responses:
        "200":
          description: "Diagnostic complet du projet"
          content:
            "application/json":
              schema:
                allOf:
                  -                     type: object
                    required:
                      - "_meta"
                    properties:
                      _meta:
                        "$ref": "#/components/schemas/AiadMeta"
                  -                     type: object
                    required:
                      - ok
                      - version
                      - racine
                      - checks
                    properties:
                      ok:
                        type: boolean
                      version:
                        type: string
                      racine:
                        type: string
                      checks:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            ok:
                              type: boolean
                            message:
                              type: string
                            severity:
                              type:
                                - string
                                - "null"
                              enum:
                                - warn
                                - info
                                - null
                      leadership:
                        "$ref": "#/components/schemas/LeadershipMetrics"
                      santeGlobale:
                        type:
                          - object
                          - "null"
                      publicationContext:
                        "$ref": "#/components/schemas/PublicationContext"
                      santeStrictFail:
                        type: object
                        properties:
                          seuil:
                            type: integer
                          score:
                            type: integer
