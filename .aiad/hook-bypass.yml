# AIAD SDD Mode — Whitelist du hook pre-commit
#
# Liste des fichiers ignorés par le check Drift Lock (un pattern par ligne,
# préfixé par "- "). À utiliser avec parcimonie : chaque exception affaiblit
# le Drift Lock.
#
# Convention de matching (style gitignore) :
#   - pattern sans "/"  → match sur le basename       (ex. "*.md", "package.json")
#   - pattern avec "/"  → match sur le chemin complet (ex. "docs/**/*.md")
#
# Note : les artefacts AIAD (.aiad/specs/*, .aiad/intents/*, etc.) sont
# classés AVANT la whitelist, donc un pattern large comme "*.md" ne masque
# jamais une SPEC.

patterns:
  # Documentation racine
  - "README.md"
  - "CHANGELOG.md"
  - "DOCUMENTATION.md"
  - "LICENSE"

  # Documents narratifs du framework (prose, pas de code — racine + copies templates/)
  # Le Drift Lock (sync code↔SPEC) ne s'applique pas à de la documentation.
  - "frameworkAIAD.md"
  - "SDDMode.md"
  - "GUIDE.md"

  # Documents de légitimation (argumentaires publiés — pas de code, pas de SPEC)
  - "docs/legitimation/**"

  # Notes de release (prose pédagogique — pas de code, pas de SPEC)
  - "docs/release-notes/**"

  # Veille produit (synthèse conférences — pas de code, pas de SPEC)
  - "docs/veille-*"

  # Argumentaires commerciaux (prose, pas de code)
  - "argumentaires/**"

  # Agents de gouvernance réglementaire (templates Tier 1 + fixtures bench + agents Claude Code)
  # Les agents sont eux-mêmes la source des annotations — l'annotation @governance serait circulaire
  - "templates/.aiad/gouvernance/**"
  - "bench/**/.aiad/gouvernance/**"
  - ".claude/agents/**"

  # Configuration Claude Code (emit-rules v1.18) — commandes, skills, règles, settings
  # Ces fichiers sont générés par `npx aiad-sdd emit-rules`, pas du code applicatif
  - ".claude/**"
  - "AGENTS.md"
  # Cibles multi-runtime emit-rules (header `DO NOT EDIT — regenerate via
  # /aiad-emit-rules`) — dérivées de l'AGENT-GUIDE, jamais éditées à la main
  - "CLAUDE.md"
  - "GEMINI.md"
  - ".codex/**"
  - ".cursor/**"

  # Manifestes et lockfiles (mises à jour de dépendances)
  - "package.json"
  - "package-lock.json"
  - "pnpm-lock.yaml"
  - "yarn.lock"
  - "uv.lock"
  - "poetry.lock"
  - "Cargo.lock"
  - "go.sum"

  # Fichiers d'environnement de référence (jamais de secrets)
  - ".env.example"
  - ".gitignore"
  - ".npmignore"
  - ".editorconfig"

  # Métriques générées automatiquement par les commandes /sdd-*
  - ".aiad/metrics/**"
  - ".aiad/facts/**"

  # GitHub Actions (CI traceability v1.10 + workflows AIAD v1.18)
  - ".github/workflows/sdd-trace.yml"
  # Workflows CI (infra de build/test — pas de logique applicative régie par SPEC)
  - ".github/workflows/bun-smoke.yml"
  - ".github/workflows/aiad-dashboard.yml"
  - ".github/workflows/aiad-docs-check.yml"
  - ".github/workflows/aiad-emit-rules-check.yml"
  - ".github/workflows/aiad-pr-review.yml"
  - ".github/workflows/canary.yml"
  # Workflows CI ajoutés en INTENT-013 (gate version + déploiement site) —
  # leur logique métier est régie par SPEC-013-3 / 013-4a (annotations @spec
  # dans le YAML) ; ici on évite le faux positif de l'heuristique git.
  - ".github/workflows/aiad-version-check.yml"
  - ".github/workflows/site-deploy.yml"
  # Configuration Jekyll du sous-dossier docs/ (méta de build, pas de logique
  # applicative régie par SPEC)
  - "docs/_config.yml"
  # Manifeste GitHub App (configuration marketplace — pas de logique applicative)
  - ".github/aiad-app-manifest.yml"

  # Infrastructure du hook pre-commit (le mécanisme du Drift Lock lui-même
  # et ses tests — pas une fonctionnalité applicative régie par une SPEC)
  - "templates/.aiad/hooks/**"
  - "bench/**/.aiad/hooks/**"
  - "test/pre-commit.test.js"

  # Outillage interne (scripts de release, lint, CI) — correctifs de faux positifs
  - "scripts/lint.js"
  - "scripts/release.js"
  - "scripts/coverage-threshold.js"
  - "scripts/bun-parity.js"

  # Tests de l'outillage sécurité — contiennent des fixtures volontairement
  # en forme de secrets/PII (sk_live_, ghp_, NIR…) pour vérifier la détection
  - "test/pii-scan.test.js"

  # Correctifs de fiabilité CI (mtime, timing, platform differences) — pas de
  # changement de comportement applicatif, pas de SPEC à mettre à jour
  - "test/dashboard-sre.test.js"

  # Alignement scanner JNSP avec le hook jnsp-scan.js : exclusion .md + dossiers
  # de fixtures (test/, bench/, docs/, templates/) pour éliminer les faux positifs.
  # Correction interne de l'outil, pas une nouvelle fonctionnalité régie par une SPEC.
  - "lib/dashboard/tech-debt.js"
  - "test/dashboard-tech-debt.test.js"

  # Renforcement de la couverture mutation (workflow « Mutation testing ») —
  # ajout de tests tuant des mutants survivants, aucun comportement applicatif
  # nouveau, pas de SPEC à mettre à jour
  - "test/release.test.js"
  - "test/sbom.test.js"

  # Module d'agrégation dashboard (#561) — orchestre des modules existants,
  # pas de logique métier nouvelle propre à une SPEC dédiée
  - "lib/dashboard/backlog-health-score.js"

  # Correctifs de portabilité cross-runtime (Node 18 / macOS / Bun) débloquant
  # les workflows CI — internes d'outillage sans SPEC dédiée :
  #   - esm-import : repli data: URL pour charger un hook ESM sous Node 18 / CommonJS
  #   - command-hooks / plugins : utilisent ce loader robuste
  #   - sdd-trace : fallback polling quand fs.watch(recursive) est indisponible (Linux < Node 20)
  - "lib/esm-import.js"
  - "lib/command-hooks.js"
  - "lib/plugins.js"
  - "lib/sdd-trace.js"
  - "lib/trace-cache.js"
  # Exclusion des définitions d'agents de gouvernance du veto circulaire
  - "lib/veto.js"
  - "lib/dashboard/watch.js"
  # Tests rendus déterministes/portables (import.meta.dirname → idiome Node 18,
  # locale forcée, couverture du fallback polling) — pas de comportement applicatif
  - "test/i18n.test.js"
  - "test/templates.test.js"
  - "test/import.test.js"
  - "test/trace-watch.test.js"
  - "test/dashboard-watch.test.js"
  - "test/migrate-v2.test.js"
  - "test/brief.test.js"
  - "test/skills.test.js"
  - "test/standup-url.test.js"
  - "test/obsidian-export.test.js"
  # Fixtures de tests corrigées suite au resserrement ANNOTATION_REGEX (IDs numériques
  # stricts) et au bump CACHE_VERSION 1 → 2 — pas de logique applicative nouvelle
  - "test/sarif.test.js"
  - "test/spec-suggester.test.js"
  - "test/trace-cache.test.js"
  - "test/trace-git.test.js"
  # Régression du même resserrement : placeholders rejetés, ignore marker,
  # statut in-progress non bloquant — tests de l'outillage de traçabilité
  - "test/annotations.test.js"
  - "test/trace.test.js"

  # Site statique de documentation — contient des exemples littéraux de
  # marqueurs TODO-JNSP dans des blocs <pre><code> et <p> de documentation.
  # Ce sont des exemples pédagogiques, pas des marqueurs non résolus.
  - "site/**"

  # Fixture générée du scénario bench (dashboard HTML/JSON/SVG) — sortie de
  # `aiad-sdd dashboard`, lue par le test de conformité OpenAPI #373. Générée,
  # pas du code régi par une SPEC.
  - "bench/**/dashboard/**"

  # Dashboard HTML généré — sortie de `npx aiad-sdd dashboard` (artefact dérivé
  # des sources et artefacts SDD). Jamais édité à la main, toujours régénéré.
  - "dashboard/**"

  # Enregistrements structurels déclenchés par SPEC-019-1/019-2 (INTENT-019) :
  # ajout de `suggest-tests` au registre + `earsSpecsSansTests` au schéma OpenAPI.
  # SPEC-015-2-1 reste la SPEC maîtresse du registre — pas de nouvelle SPEC requise
  # pour un ajout d'entrée unitaire issu d'une autre SPEC.
  - "lib/commands-registry.js"
  - "lib/cli-schema.js"
  - "test/commands-registry.test.js"

  # Évolution itérative de la statusline (SPEC-009-1 archivée) : ajout thinking,
  # quota rate-limit et note de session — pas de nouvelle SPEC pour un enrichissement
  # d'affichage sans impact comportemental sur le cycle SDD.
  - "lib/statusline.js"
  - "test/statusline.test.js"
  - ".aiad/hooks/statusline.js"
  - "bin/aiad-sdd.js"
