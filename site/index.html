<script>
/* Redirection selon la langue mémorisée ou celle du navigateur */
(function () {
  try {
    var saved = localStorage.getItem("sdd-lang");
    var lang = saved || ((navigator.language || "fr").slice(0, 2) === "en" ? "en" : "fr");
    location.replace(lang === "en" ? "en/index.html" : "fr/index.html");
  } catch (_) { /* la page de choix reste affichée */ }
})();
</script>
