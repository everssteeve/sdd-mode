# AIAD SDD Mode — Traceability check
#
# Évolution #6 : la matrice de traçabilité Intent ↔ SPEC ↔ Code ↔ Tests est
# vérifiée à chaque PR. Un gap bloquant (SPEC validée sans code, SPEC orpheline
# référencée par le code, Intent orphelin) fait échouer la pipeline.
#
# Pré-requis : `aiad-sdd` accessible via `npx` ou installé en devDependency.
#
# Documentation : https://aiad.ovh

name: SDD Trace (Drift Lock — machine-vérifiable)

on:
  pull_request:
    branches: [main, master, dev]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  trace:
    name: Matrice Intent ↔ SPEC ↔ Code ↔ Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install aiad-sdd
        run: |
          if [ -f package.json ]; then
            npm install --no-audit --no-fund --omit=optional || true
          fi
          npm install --no-save --no-audit --no-fund aiad-sdd@latest

      - name: Run sdd trace (fail on blocking gap)
        run: npx aiad-sdd trace --fail-on-gap

      - name: Upload traceability artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sdd-trace
          path: .aiad/metrics/traceability/
          if-no-files-found: warn

      - name: Comment PR with summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '.aiad/metrics/traceability/trace.md';
            if (!fs.existsSync(path)) return;
            const md = fs.readFileSync(path, 'utf-8');
            const truncated = md.length > 60000 ? md.slice(0, 60000) + '\n\n_(tronqué — voir l\'artefact `sdd-trace`)_' : md;
            const body = [
              '<!-- aiad-sdd:trace -->',
              '## SDD Trace — Drift Lock (machine-vérifiable)',
              '',
              truncated,
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find((c) => c.body && c.body.includes('<!-- aiad-sdd:trace -->'));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
