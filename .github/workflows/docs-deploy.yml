name: docs-deploy

# Régénère la documentation utilisateur (auto-générée à partir de 5 sources
# de vérité : CLI, slash commands, skills, gouvernance, annotations) et la
# publie sur GitHub Pages. Garantit que `aiad.ovh/docs` reste **toujours à
# jour à 100 %** sans intervention manuelle — critère leadership EU/FR.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Régénère DOCUMENTATION.md depuis les sources
        run: |
          node bin/aiad-sdd.js docs --out docs/DOCUMENTATION.md
          # Vérifie que la doc à la racine du repo est aussi synchronisée.
          # Si non, le workflow `aiad-docs-check.yml` aurait dû bloquer la PR.
          node bin/aiad-sdd.js docs --check

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build avec Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
