name: Release

# Publication sur npm déclenchée par un tag `v*`. Provenance signée
# (https://docs.npmjs.com/generating-provenance-statements) pour permettre
# la vérification supply chain depuis les projets clients.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: npm publish (provenance signée)
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # requis pour `npm publish --provenance`
      contents: write   # requis pour git push metrics (SPEC-027-3)
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG_VERSION ≠ package.json $PKG_VERSION" >&2
            exit 1
          fi

      # Gates bloquants avant publication (SPEC-014-1 / INTENT-014) — parité avec
      # `prepublishOnly`. `npm publish` redéclenche prepublishOnly, mais on arme
      # aussi les gates ici pour un échec précoce et lisible au moment du release.
      - name: Gates qualité (lint + deps + size + couverture seuils)
        run: |
          npm run lint
          npm run lint:deps
          npm run lint:size
          npm run test:coverage:threshold

      - name: Publish (avec provenance npm SLSA L3)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # @intent INTENT-027
      # @spec SPEC-027-3-ci-workflow-steps
      - name: Record DORA metrics
        if: success()
        continue-on-error: true
        run: |
          npx aiad-sdd dora --record --auto \
            --status=success \
            --release=${{ github.ref_name }} \
            --commit=${{ github.sha }}

      - name: Commit metrics to repository
        if: success()
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .aiad/metrics/deployments/
          if ! git diff --cached --quiet; then
            git commit -m "chore(metrics): record release ${{ github.ref_name }}"
            git push origin main || (git pull --rebase origin main && git push origin main)
          fi

      # Double signature : npm provenance (SLSA L3 via Sigstore Rekor automatique)
      # + attestation AIAD interne signée HMAC vérifiable hors-ligne.
      # https://aiad.ovh/provenance — item backlog #90
      - name: Generate AIAD provenance attestation (SLSA v1.0 signed HMAC)
        if: env.AIAD_PROVENANCE_SECRET != ''
        run: node bin/aiad-sdd.js provenance generate --json
        env:
          AIAD_PROVENANCE_SECRET: ${{ secrets.AIAD_PROVENANCE_SECRET }}

      - name: Upload AIAD attestation as release artifact
        if: env.AIAD_PROVENANCE_SECRET != ''
        uses: actions/upload-artifact@v4
        with:
          name: aiad-attestation-${{ github.ref_name }}
          path: .aiad/provenance/attestation.json
          if-no-files-found: error
          retention-days: 90
        env:
          AIAD_PROVENANCE_SECRET: ${{ secrets.AIAD_PROVENANCE_SECRET }}
