# AIAD SDD Mode — Dashboard publication (GitHub Pages)
#
# Régénère le dashboard HTML multi-pages à chaque push sur main et le publie
# via GitHub Pages. Le dashboard reflète l'état réel du projet (intents,
# specs, traçabilité, gouvernance, métriques) et est consultable depuis
# n'importe quel navigateur — desktop comme mobile.
#
# Pré-requis :
#   1. Activer GitHub Pages : Settings → Pages → Source = GitHub Actions
#   2. Le dépôt doit être public OU le plan doit autoriser Pages sur privé
#
# Documentation : https://aiad.ovh

name: AIAD Dashboard (GitHub Pages)

on:
  push:
    branches: [main, master]
    paths:
      - '.aiad/**'
      - 'src/**'
      - 'app/**'
      - 'lib/**'
      - 'tests/**'
      - 'package.json'
      - '.github/workflows/aiad-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule publication à la fois ; on ne tue pas la précédente pour éviter
# qu'un déploiement partiel reste en ligne.
concurrency:
  group: aiad-dashboard
  cancel-in-progress: false

jobs:
  build:
    name: Génération du dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install aiad-sdd
        run: |
          if [ -f package.json ]; then
            npm install --no-audit --no-fund --omit=optional || true
          fi
          npm install --no-save --no-audit --no-fund aiad-sdd@latest

      - name: Build dashboard
        run: |
          npx aiad-sdd dashboard \
            --out _site \
            --source-base "https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/" \
            --quiet

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Publication GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
